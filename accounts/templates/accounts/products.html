{% extends 'accounts/main.html' %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM - Products{% endblock %}</title>
	<style>
		body {
			background-color: rgb(233, 254, 255);
		}
		h5 {
			border-color: rgb(156, 155, 155);
            border-style: solid;
            border-width: 2px;
            border-radius: 5px;
			background-color: rgb(49, 49, 49);
			color: white;
			font-size: large;
			height: 35px;
		}
		hr {
			border-top: solid coral 2px;
		}
	</style>
</head>
<body>
    <br>
		<div class="row">
			<div class="col-md">
				<div class="card card-body">
					<h5>Products</h5>
					<hr>
				</div>
				<div class="card card-body">
					<table class="table">
						<tr>
							<th>Product</th>
							<th>Category</th>
							<th>Price</th>
						</tr>
					{% for i in products %}
					<tr>
					<td>{{ i.name }}</td>
					<td>{{ i.category }}</td>
					<td>{{ i.price }}</td>
				</tr>
					{% endfor %}
					</table>
				</div>
			</div>
			
		</div>
</body>
</html>
{% endblock %}
